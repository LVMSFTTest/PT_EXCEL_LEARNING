<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Session — Dataset Reference</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a1628;--card:#111e30;--alt:#182840;--code:#08101e;--accent:#3b82f6;--glow:rgba(59,130,246,.10);--teal:#2dd4bf;--purple:#a78bfa;--gold:#facc15;--coral:#fb7185;--green:#34d399;--orange:#fb923c;--sky:#7dd3fc;--text:#e2e8f0;--muted:#7e8fa6;--dim:#4b5e74;--border:#1e2d42;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
.top-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,22,40,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-brand{padding:10px 20px 0;display:flex;align-items:center;gap:10px;}
.nav-logo{font-size:18px;}
.nav-title{font-family:"Playfair Display",serif;font-size:14px;font-weight:800;color:var(--accent);}
.nav-sub{font-size:11px;color:var(--muted);margin-left:auto;padding-right:20px;}
.nav-tabs{display:flex;overflow-x:auto;padding:6px 12px;gap:3px;scrollbar-width:none;}
.nav-tabs::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:7px 14px;border-radius:8px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .25s;border:1px solid transparent;white-space:nowrap;}
.nav-tab:hover{color:var(--text);background:var(--card);}
.nav-tab.active{color:var(--accent);background:var(--glow);border-color:rgba(59,130,246,.28);}
.pages-wrap{margin-top:86px;height:calc(100vh - 86px);overflow:hidden;}
.page{display:none;height:100%;overflow-y:auto;padding:24px 20px 60px;}
.page.active{display:block;}
.pg{max-width:1000px;margin:0 auto;}
h1{font-family:"Playfair Display",serif;font-size:26px;font-weight:800;margin-bottom:5px;}
h2{font-family:"Playfair Display",serif;font-size:19px;font-weight:700;margin:24px 0 10px;color:var(--accent);}
h3{font-size:14px;font-weight:700;margin:14px 0 6px;color:var(--teal);}
p{font-size:13.5px;line-height:1.7;margin-bottom:6px;}
.sub{font-size:14px;color:var(--muted);margin-bottom:20px;}
/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.search-box{background:var(--code);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12.5px;color:var(--text);font-family:"DM Sans",sans-serif;outline:none;width:220px;}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--dim);}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.8px;text-transform:uppercase;}
.badge.bl{background:rgba(59,130,246,.12);color:var(--accent);}
.badge.gn{background:rgba(52,211,153,.12);color:var(--green);}
.badge.yl{background:rgba(250,204,21,.12);color:var(--gold);}
.badge.pp{background:rgba(167,139,250,.12);color:var(--purple);}
.badge.or{background:rgba(251,146,60,.12);color:var(--orange);}
.badge.tl{background:rgba(45,212,191,.12);color:var(--teal);}
.row-count{font-size:11px;color:var(--muted);font-family:"JetBrains Mono",monospace;}
/* TABLE WRAPPER */
.tbl-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px;max-height:calc(100vh - 230px);}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
thead tr{background:var(--alt);position:sticky;top:0;z-index:10;}
thead th{padding:9px 12px;text-align:left;font-weight:700;font-size:11px;letter-spacing:.5px;color:var(--accent);border-bottom:2px solid var(--border);white-space:nowrap;}
thead th.num{color:var(--muted);width:40px;text-align:center;}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s;}
tbody tr:hover{background:rgba(59,130,246,.04);}
tbody td{padding:7px 12px;color:var(--text);white-space:nowrap;}
tbody td.num{color:var(--dim);font-family:"JetBrains Mono",monospace;font-size:11px;text-align:center;}
tbody td.hl{color:var(--teal);font-family:"JetBrains Mono",monospace;}
tbody td.price{color:var(--green);font-family:"JetBrains Mono",monospace;}
tbody td.date{color:var(--gold);font-family:"JetBrains Mono",monospace;font-size:11.5px;}
.no-results{padding:30px;text-align:center;color:var(--muted);font-size:13px;}
/* META CARDS */
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;}
.meta-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.meta-card .mv{font-family:"JetBrains Mono",monospace;font-size:20px;font-weight:700;color:var(--accent);}
.meta-card .ml{font-size:10.5px;color:var(--muted);margin-top:2px;}
/* SHEET INFO */
.sheet-info{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--teal);border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:13px;}
.sheet-info strong{color:var(--teal);}
/* PROG */
.prog{position:fixed;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--teal));transition:width .15s;z-index:100;}
/* FORMULA HINT */
.fhint{background:var(--code);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--orange);line-height:1.8;}
@media(max-width:700px){.page{padding:16px 10px 50px;}.search-box{width:160px;}}
</style>
</head>

function escHtml(v){
  if(v===null||v===undefined||v==="") return "<span style='color:var(--dim);'>—</span>";
  return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function buildPage(sheet, idx){
  const rows = DS[sheet.key];
  const dataRows = rows.slice(1); // skip header row from data
  const hdrs = sheet.cols;

  let metaHtml = '<div class="meta-grid">' + sheet.meta.map(m=>`<div class="meta-card"><div class="mv">${m.v}</div><div class="ml">${m.l}</div></div>`).join('') + '</div>';

  let tableHead = '<thead><tr><th class="num">#</th>' + hdrs.map(h=>`<th>${h}</th>`).join('') + '</tr></thead>';

  function buildRows(data){
    if(!data.length) return `<tr><td colspan="${hdrs.length+1}" class="no-results">No matching records found</td></tr>`;
    return data.map((row,i)=>{
      let cells = '<td class="num">'+(i+1)+'</td>';
      hdrs.forEach((_,ci)=>{
        let v = row[ci] !== undefined ? row[ci] : '';
        let cls = sheet.colTypes[ci]||'';
        cells += `<td class="${cls}">${escHtml(v)}</td>`;
      });
      return `<tr>${cells}</tr>`;
    }).join('');
  }

  const div = document.createElement('div');
  div.className = 'page';
  div.id = 'page-'+idx;
  div.innerHTML = `<div class="pg">
    <h1>${sheet.label}</h1>
    <div class="sheet-info"><strong>Used in:</strong> ${sheet.info}</div>
    <div class="fhint">${sheet.hint}</div>
    ${metaHtml}
    <div class="toolbar">
      <input class="search-box" placeholder="Search..." id="search-${idx}" type="text">
      <span class="badge ${sheet.badge}">${sheet.badgeText}</span>
      <span class="row-count" id="rc-${idx}">${dataRows.length} rows</span>
    </div>
    <div class="tbl-wrap" id="tw-${idx}">
      <table id="tbl-${idx}">
        ${tableHead}
        <tbody id="tbody-${idx}">${buildRows(dataRows)}</tbody>
      </table>
    </div>
  </div>`;

  document.getElementById('pagesWrap').appendChild(div);

  // Search
  document.getElementById('search-'+idx).addEventListener('input', function(){
    const q = this.value.toLowerCase();
    const filtered = !q ? dataRows : dataRows.filter(row=>
      sheet.searchCols.some(ci=> String(row[ci]||'').toLowerCase().includes(q))
    );
    document.getElementById('tbody-'+idx).innerHTML = buildRows(filtered);
    document.getElementById('rc-'+idx).textContent = filtered.length + ' rows' + (q?' (filtered)':'');
  });
}

// Build tabs + pages
const navTabs = document.getElementById('navTabs');
SHEETS.forEach((sheet,i)=>{
  const tab = document.createElement('div');
  tab.className = 'nav-tab'+(i===0?' active':'');
  tab.textContent = sheet.label;
  tab.addEventListener('click',()=>go(i));
  navTabs.appendChild(tab);
  buildPage(sheet, i);
});

let cur = 0;
const pages = ()=>document.querySelectorAll('.page');
function go(i){
  pages()[cur].classList.remove('active');
  document.querySelectorAll('.nav-tab')[cur].classList.remove('active');
  cur=i;
  pages()[cur].classList.add('active');
  document.querySelectorAll('.nav-tab')[cur].classList.add('active');
  pages()[cur].scrollTop=0;
  document.querySelectorAll('.nav-tab')[cur].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  up();
}
function up(){
  const p=pages()[cur];
  const pct=p.scrollHeight<=p.clientHeight?100:(p.scrollTop/(p.scrollHeight-p.clientHeight))*100;
  document.getElementById('prog').style.width=pct+'%';
}
document.querySelectorAll('.page').forEach(p=>p.addEventListener('scroll',up));
document.addEventListener('keydown',e=>{const pg=pages();if(e.key==='ArrowRight'&&cur<pg.length-1)go(cur+1);if(e.key==='ArrowLeft'&&cur>0)go(cur-1);});
pages()[0].classList.add('active');
up();
</script>
